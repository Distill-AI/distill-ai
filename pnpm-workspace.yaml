packages:
  - "client"

allowBuilds:
  "@nestjs/core": true
  "@scarf/scarf": true
  msgpackr-extract: true
  protobufjs: false # OTLP exporter transitive; its native build is optional (pure-JS fallback)

# Force patched versions of vulnerable transitive dependencies.
# Review on major NestJS / Axios upgrades.
overrides:
  multer: ">=2.2.0" # GHSA-xf7r-hgr6-v32p / GHSA-v52c-386h-88mc / GHSA-5528-5vmv-3xc2 / GHSA-72gw-mp4g-v24j
  lodash: ">=4.17.24" # GHSA-r5fr-rjxr-66jc
  glob: ">=10.5.0" # GHSA-c2c7-rcm5-vvqj (via @nestjs/cli, devDep)
  picomatch: ">=4.0.4" # GHSA-5j98-mcp5-4vw2 (via @nestjs/cli, devDep)
  tmp: ">=0.2.6" # GHSA-ph9p-34f9-6g65 (via @nestjs/cli, devDep)
  form-data: ">=4.0.6" # GHSA-hmw2-7cc7-3qxx (via axios in client)
