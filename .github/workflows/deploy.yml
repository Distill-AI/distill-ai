name: Deploy

on:
  push:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/distill-ai

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "value=${{ github.ref_name }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.value }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.tag.outputs.value }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/distill-ai/

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          BRANCH: ${{ github.ref_name }}
          GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}/distill-ai
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: IMAGE_TAG,BRANCH,GHCR_REGISTRY
          command_timeout: 10m
          script: |
            set -e

            if [ "$BRANCH" = "staging" ]; then
              PROJECT=distill-staging
              ENV_FILE=/opt/distill-ai/staging/.env
              CLIENT_PORT=8080
              API_PORT=3001
            else
              PROJECT=distill-prod
              ENV_FILE=/opt/distill-ai/prod/.env
              CLIENT_PORT=80
              API_PORT=3000
            fi

            cd /opt/distill-ai

            GHCR_REGISTRY=$GHCR_REGISTRY \
            IMAGE_TAG=$IMAGE_TAG \
            CLIENT_PORT=$CLIENT_PORT \
            API_PORT=$API_PORT \
            docker compose -p $PROJECT --env-file $ENV_FILE pull

            GHCR_REGISTRY=$GHCR_REGISTRY \
            IMAGE_TAG=$IMAGE_TAG \
            CLIENT_PORT=$CLIENT_PORT \
            API_PORT=$API_PORT \
            docker compose -p $PROJECT --env-file $ENV_FILE up -d

            docker compose -p $PROJECT exec -T api pnpm migration:run

            sleep 10
            curl -sf http://localhost:$API_PORT/api/v1/health \
              || { echo "Health check failed after deploy"; exit 1; }

            echo "Deploy complete — $PROJECT @ $IMAGE_TAG"
