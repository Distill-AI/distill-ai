name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-checks:
    name: API — Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  client-checks:
    name: Client — Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter client lint:check

      - name: Test
        run: pnpm --filter client test

      - name: Build
        run: pnpm --filter client build

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Forbidden pattern scan
        run: node scripts/forbidden-pattern-scan.js .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lazarus scanner
        run: python3 scripts/lazarus_scanner.py .

      - name: Audit API dependencies
        run: pnpm audit --audit-level=high

      - name: Audit client dependencies
        run: pnpm --filter client audit --audit-level=high

      - name: Gitleaks secret scan
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . -v

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: node_modules,dist,client/node_modules,client/dist,.git
          format: table
