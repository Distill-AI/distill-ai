services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-distill_ai}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${GHCR_REGISTRY:-distill-ai}/api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${GHCR_REGISTRY:-distill-ai}/api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_NAME: worker
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: ${GHCR_REGISTRY:-distill-ai}/client:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "${CLIENT_PORT:-80}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
